<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>123 Drive Lite | SPY-E & 123Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <div class="neo-card p-6 mb-8 bg-[#ffde00]">
            <h1 class="text-4xl font-black uppercase tracking-tighter italic">123 DRIVE LITE</h1>
            <p class="font-bold underline text-sm">PROUDLY POWERED BY SPY-E & 123TOOL</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="neo-card p-5 bg-white">
                <p class="font-black mb-3 uppercase text-xs text-gray-500">📤 Upload File Ke HP</p>
                <input type="file" id="fileInput" class="mb-4 block w-full text-sm font-bold border-2 border-black p-2">
                <button onclick="uploadFile()" class="neo-btn px-6 py-2 font-black uppercase text-sm w-full">Gass Upload</button>
            </div>
            
            <div class="neo-card p-5 bg-[#00e5ff] flex flex-col justify-center">
                <p class="font-black uppercase text-xs text-gray-800">📍 Lokasi Direktori:</p>
                <p id="currentPath" class="font-black text-xl truncate border-b-4 border-black inline-block mt-1">/sdcard</p>
            </div>
        </div>

        <div class="neo-card overflow-hidden bg-white">
            <table class="w-full text-left border-collapse">
                <thead class="bg-black text-white">
                    <tr>
                        <th class="p-4 uppercase text-sm font-black tracking-widest">Konten / Nama File</th>
                        <th class="p-4 uppercase text-sm font-black text-right tracking-widest">Opsi</th>
                    </tr>
                </thead>
                <tbody id="fileList" class="font-bold">
                    </tbody>
            </table>
        </div>

        <div class="mt-12 text-center">
            <div class="inline-block neo-card bg-black text-white px-4 py-2">
                <p class="font-black text-xs uppercase tracking-widest">
                    &copy; 2026 SPY-E & 123Tool | Developed by Rolandino
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
