<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>123 Drive Lite | SPY-E</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f0f0; font-family: 'Courier New', Courier, monospace; }
        .neo-card {
            background: #fff;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px 0px #000;
        }
        .neo-btn {
            background: #ffde00; /* Warna khas Saweria */
            border: 3px solid #000;
            box-shadow: 4px 4px 0px 0px #000;
            transition: all 0.1s;
        }
        .neo-btn:active {
            box-shadow: 0px 0px 0px 0px #000;
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <div class="neo-card p-6 mb-8 bg-[#ffde00]">
            <h1 class="text-3xl font-black uppercase tracking-tighter">123 DRIVE LITE</h1>
            <p class="font-bold underline text-sm">PROUDLY POWERED BY SPY-E & 123TOOL</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="neo-card p-4">
                <p class="font-black mb-2 uppercase text-xs text-gray-500">Upload File Ke HP</p>
                <input type="file" id="fileInput" class="mb-2 block w-full text-sm">
                <button onclick="uploadFile()" class="neo-btn px-4 py-1 font-black uppercase text-sm">Gass Upload</button>
            </div>
            <div class="neo-card p-4 flex flex-col justify-center">
                <p class="font-black uppercase text-xs text-gray-500">Path Sekarang:</p>
                <p id="currentPath" class="font-bold text-lg truncate">/sdcard</p>
            </div>
        </div>

        <div class="neo-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-black text-white">
                    <tr>
                        <th class="p-3 uppercase text-sm font-black">Nama File / Folder</th>
                        <th class="p-3 uppercase text-sm font-black text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody id="fileList" class="font-bold">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
